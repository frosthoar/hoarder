# pyproject.toml
[tool.pytest.ini_options]
typeguard-packages = "hoarder"
pythonpath = "src"
# optional extras:
typeguard-collection-check-strategy = "ALL_ITEMS"
typeguard-debug-instrumentation    = true

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 0  # Single line output to match GitHub super-linter
force_single_line = false

[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
extend-exclude = '''
/(
    # The following are specific to Black, you probably don't want those.
    tests/data/
    | profiling/
)
'''
